server:
  port: 8082
spring:
  application:
    name: "SolicitudesService"
  flyway:
    enabled: true
    url: "jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_SOLICITUDES_NAME}"
    user: "${DB_USER}"
    password: "${DB_PASSWORD}"
  devtools:
    add-properties: false
adapters:
  r2dbc:
    host: "${DB_HOST}"
    port: "${DB_PORT}"
    database: "${DB_SOLICITUDES_NAME}"
    schema: "public"
    username: "${DB_USER}"
    password: "${DB_PASSWORD}"
  restconsumer:
    url: "${AUTH_SERVICE_URL}"
    timeout: 5000
  jwt:
    secret: "${JWT_SECRET}"
    expiration-ms: 28800000
  sqs:
    region: "${AWS_REGION:us-east-2}"
    queueUrlNotificaciones: "${SQS_QUEUE_URL_NOTIFICACIONES}"
    queueUrlValidacion: "${SQS_QUEUE_URL_VALIDACION}"
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
  health:
    circuitbreakers:
      enabled: true
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"
resilience4j:
  circuitbreaker:
    instances:
      tiposPrestamo:
        registerHealthIndicator: true
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: "2s"
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowSize: 10
        minimumNumberOfCalls: 10
        waitDurationInOpenState: "10s"
adapter:
  sqs:
    region: "us-east-1"
    queueUrl: "http://localhost:4566/000000000000/sample"
    endpoint: "http://localhost:4566 # For localstack only"
entrypoint:
  sqs:
    region: "${AWS_REGION:us-east-2}"
    queueUrlDecision: "${SQS_QUEUE_URL_DECISION}"
    waitTimeSeconds: 20
    maxNumberOfMessages: 10
    visibilityTimeoutSeconds: 10
    numberOfThreads: 1
